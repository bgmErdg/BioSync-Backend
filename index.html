<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | BioSync</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=18">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    
    <nav class="sidebar">
        <div class="user-profile">
            <div class="profile-pic-container" onclick="document.getElementById('file-input').click()" title="Change Avatar">
                <img src="{{ url_for('static', filename='uploads/' + current_user.profile_pic) }}" id="sidebar-avatar" onerror="this.src='https://ui-avatars.com/api/?name={{ current_user.username }}&background=f7f7f5&color=333333&bold=true'">
                <div class="overlay"><span class="material-icons-round">edit</span></div>
            </div>
            <span>{{ current_user.username }}'s Workspace</span>
            <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="uploadAvatar(this)">
        </div>
        
        <div class="menu-group">
            <label>PAGES</label>
            <a href="/dashboard" class="active"><span class="material-icons-round">dashboard</span> Dashboard</a>
            <a href="/analytics"><span class="material-icons-round">analytics</span> Analytics</a>
        </div>
        <div class="bottom-menu">
            <a href="/logout" class="logout-btn"><span class="material-icons-round">logout</span> Logout</a>
        </div>
    </nav>

    <main class="content">
        <header class="top-bar">
            <div class="breadcrumbs">BioSync / Dashboard / <b>Daily Metrics</b></div>
        </header>

        <div class="page-cover">
            <h1>Daily Check-in</h1>
            <p class="subtitle">Update your biological metrics to sync the avatar state and save your daily ratio.</p>
        </div>

        <div class="notion-block callout" style="margin-bottom: 15px;">
            <span class="icon">📅</span>
            <div class="callout-content" style="display: flex; align-items: center;">
                <b>Record Date: </b>
                <input type="date" id="record-date" style="border: none; background: transparent; font-family: inherit; font-weight: 600; color: #333; margin-left: 10px; cursor: pointer; outline: none;">
            </div>
        </div>

        <div class="notion-block callout">
            <span class="icon">⚡</span>
            <div class="callout-content">
                <b>Current Mode</b>
                <select id="mode-selector">
                    <option value="standard">Standard (Balanced Life)</option>
                    <option value="discipline">Discipline (Deep Focus)</option>
                    <option value="holiday">Holiday (Recovery)</option>
                </select>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="input-section">
                <div class="metric-card">
                    <label>💤 Sleep Time</label>
                    <div class="time-inputs">
                        <input type="number" id="sleep-h" placeholder="HH" value="8" min="0" max="23"> : 
                        <input type="number" id="sleep-m" placeholder="MM" value="00" min="0" max="59">
                    </div>
                </div>
                <div class="metric-card">
                    <label>💻 Work / Study</label>
                    <div class="time-inputs">
                        <input type="number" id="work-h" placeholder="HH" value="8" min="0" max="23"> : 
                        <input type="number" id="work-m" placeholder="MM" value="00" min="0" max="59">
                    </div>
                </div>
                <div class="metric-card">
                    <label>☕ Socialise</label>
                    <div class="time-inputs">
                        <input type="number" id="social-h" placeholder="HH" value="5" min="0" max="23"> : 
                        <input type="number" id="social-m" placeholder="MM" value="00" min="0" max="59">
                    </div>
                </div>
                <div class="metric-card">
                    <label>🧹 Labor / Chores</label>
                    <div class="time-inputs">
                        <input type="number" id="labor-h" placeholder="HH" value="3" min="0" max="23"> : 
                        <input type="number" id="labor-m" placeholder="MM" value="00" min="0" max="59">
                    </div>
                </div>

                <div class="action-buttons">
                    <button onclick="updateState()" class="sync-btn">Check Sync</button>
                    <button onclick="saveRecord()" class="save-btn">Save Record</button>
                </div>

            </div>
            <div class="visual-section">
                <div class="visual-top">
                    <div id="avatar-container"><div id="avatar">👤</div></div>
                    <div class="console-log"><span id="status-message">Waiting for input...</span></div>
                </div>
                <div class="chart-container"><canvas id="activityChart"></canvas></div>
            </div>
        </div>
    </main>
    <script src="/static/script.js?v=18"></script>
</body>
</html>
